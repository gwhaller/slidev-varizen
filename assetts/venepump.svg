<!--
  venepump.svg — Venenpumpen-Animation
  Ebenen (unten → oben):
    water               – blaue Kanalflüssigkeit (statisch)
    fill-shore-*        – hellrote Gewebeflächen links/rechts (statisch, kein Stroke)
                          d = shore-pre + inner-line-*-Kurve + shore-post
                          nach Änderung der inner-line-* in Inkscape: pnpm run sync:shores
    outer-line-*        – rosa Außenkanten (statisch, gleiche Beziers wie fill-shore-Außenkante)
    inner-line-*        – blaue Venenwände, morph="from" morph-click="1"
                          inkscape:label="inner-shore-*"
    inner-line-*-to     – Zielform für Morph (morph="to", display:none)
                          trägt volle Strich-Formatierung für korrektes Inkscape-Preview
    valves              – 4 blaue Klappendreiecke (statisch)
    muscle-left/-right  – Muskeln (je 1× <use> auf #muscle-shape), scaleX-Animation bei Klick 1
  veneCl clipPath hält alle Elemente im sichtbaren Bildbereich (viewBox).
-->
